<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Banners | Admin</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Styles -->
    <link rel="stylesheet" href="banner-style.css">
    <link rel="stylesheet" href="manage-banner.css">

    <!-- Firebase SDKs (Compat) -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
</head>

<body>

    <div class="app-container">
        <!-- Header -->
        <header class="app-header">
            <div class="header-logo">Banner Management</div>
            <div class="header-actions">
                <a href="../index.html" class="btn btn-secondary">Back to Dashboard</a>
                <a href="add-banner.html" class="btn btn-primary">+ Add Banner</a>
            </div>
        </header>

        <main class="main-layout">

            <!-- Banner List Section -->
            <section class="banner-list-section">
                <div id="loadingState" class="loading-state">
                    <div class="spinner"></div>
                    <p>Loading banners...</p>
                </div>

                <div id="emptyState" class="empty-state-container hidden">
                    <div class="empty-icon">ðŸ–¼ï¸</div>
                    <h3>No Banners Found</h3>
                    <p>Get started by creating your first promotional banner.</p>
                    <a href="add-banner.html" class="btn btn-primary mt-4">Create Banner</a>
                </div>

                <div id="bannerGrid" class="banner-grid hidden">
                    <!-- Banners will be injected here via JS -->
                </div>
            </section>

        </main>
    </div>

    <!-- Delete Confirmation Modal -->
    <div id="deleteModal" class="modal-overlay hidden">
        <div class="modal-content">
            <h3>Delete Banner?</h3>
            <p>Are you sure you want to delete this banner? This action cannot be undone.</p>
            <div class="modal-actions">
                <button id="cancelDelete" class="btn btn-secondary">Cancel</button>
                <button id="confirmDelete" class="btn btn-danger">Delete</button>
            </div>
        </div>
    </div>

    <!-- Image Preview Modal -->
    <div id="previewModal" class="modal-overlay hidden">
        <div class="modal-content large-modal">
            <div class="modal-header">
                <h3>Banner Preview</h3>
                <button id="closePreview" class="btn-icon">&times;</button>
            </div>
            <div id="previewModalContent" class="preview-modal-body">
                <!-- Images injected here -->
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="../firebase-config.js"></script>
    <script src="../dynamic-categories.js"></script> <!-- To resolve category names if needed -->
    <script src="manage-banner.js"></script>

</body>

</html>
